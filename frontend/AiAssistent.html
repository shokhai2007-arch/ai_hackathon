<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistent — Arbitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --ink: #0a0a1a;
            --ink-mid: #12122a;
            --ink-soft: #1a1a3e;
            --paper: #e8e8ff;
            --paper-dim: #d0d0f0;
            --gold: #00f0ff;
            --gold-light: #5cf0ff;
            --gold-pale: #c0f0ff;
            --teal: #b44dff;
            --teal-dim: #7b2fcc;
            --red: #ff3366;
            --red-dim: #cc0033;
            --text-main: #e0e0ff;
            --text-dim: #8888bb;
            --text-faint: #5555aa;
            --border: rgba(0,240,255,0.15);
            --border-strong: rgba(0,240,255,0.35);

            --sidebar-bg: var(--ink-mid);
            --sidebar-hover: var(--ink-soft);
            --sidebar-active: var(--gold);
            --sidebar-text: var(--text-dim);
            --sidebar-text-active: var(--text-main);
        }

        .light {
            --ink: #f0f2f8;
            --ink-mid: #e2e5f0;
            --ink-soft: #ffffff;
            --paper: #12122a;
            --paper-dim: #1a1a3e;
            --gold: #0088cc;
            --gold-light: #00a0e8;
            --gold-pale: #b8ddf0;
            --teal: #7b2fcc;
            --teal-dim: #5a1f99;
            --red: #cc0044;
            --red-dim: #990033;
            --text-main: #1a1a3e;
            --text-dim: #5555aa;
            --text-faint: #8888bb;
            --border: rgba(0,136,204,0.2);
            --border-strong: rgba(0,136,204,0.35);

            --sidebar-bg: var(--ink-mid);
            --sidebar-hover: var(--ink-soft);
            --sidebar-active: var(--gold);
            --sidebar-text: var(--text-dim);
            --sidebar-text-active: var(--text-main);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--ink);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        h1, h2, h3, h4 { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0 24px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 26, 0.82);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .light nav { background: rgba(240, 242, 248, 0.82); }

        .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; min-width: 150px; }
        .nav-logo-text { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.15rem; color: var(--text-main); letter-spacing: -0.02em; }
        .nav-logo-text span { color: var(--gold); }

        .nav-links { display: flex; gap: 24px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 11px; font-family: 'Orbitron', sans-serif; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }

        .nav-right { display: flex; align-items: center; gap: 24px; min-width: 150px; justify-content: flex-end; }

        /* ─── SIDEBAR ─── */
        .sidebar-wrapper { flex-shrink: 0; position: relative; z-index: 20; }
        .layout-sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--border); }
        .nav-item { color: var(--sidebar-text); transition: all 0.2s ease; position: relative; cursor: pointer; border: none; background: transparent; text-align: left; }
        .nav-item:hover { color: var(--sidebar-text-active); background: var(--sidebar-hover); }
        .nav-item.active { color: var(--sidebar-text-active); }
        .nav-item.active::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 24px; background: var(--sidebar-active);
            border-radius: 0 3px 3px 0; box-shadow: 0 0 8px var(--sidebar-active);
        }
        .sidebar-collapsed { width: 64px !important; }
        .sidebar-expanded { width: 220px !important; }
        .sidebar-text-label { transition: opacity 0.2s ease, visibility 0.2s ease; white-space: nowrap; }
        .sidebar-collapsed .sidebar-text-label { opacity: 0; visibility: hidden; }

        .sidebar-divider { height: 1px; background: var(--border); margin: 12px 10px; }
        .sidebar-section-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); padding: 0 16px; margin-bottom: 8px; font-weight: 800; display: block; }
        .sidebar-collapsed .sidebar-section-title { display: none; }

        /* ─── CHAT UI ─── */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .bubble {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 2px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
        }

        .bubble.ai {
            background: var(--ink-soft);
            border: 1px solid var(--border);
            align-self: flex-start;
            color: var(--text-main);
        }
        .bubble.ai::before {
            content: 'AI';
            position: absolute;
            top: -18px; left: 0;
            font-family: 'Space Mono', monospace;
            font-size: 9px; color: var(--gold);
            letter-spacing: 1px;
        }

        .bubble.user {
            background: var(--gold);
            color: var(--ink);
            align-self: flex-end;
            font-weight: 500;
        }
        .bubble.user::before {
            content: 'YOU';
            position: absolute;
            top: -18px; right: 0;
            font-family: 'Space Mono', monospace;
            font-size: 9px; color: var(--text-faint);
            letter-spacing: 1px;
        }

        .input-area {
            padding: 24px;
            background: rgba(10, 10, 26, 0.5);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }

        .input-box {
            display: flex;
            gap: 12px;
            background: var(--ink-mid);
            border: 1px solid var(--border);
            padding: 4px;
            transition: border-color 0.2s;
        }
        .input-box:focus-within { border-color: var(--gold); }

        #chatInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 12px 16px;
            font-family: inherit;
        }

        .send-btn {
            background: var(--gold);
            color: var(--ink);
            border: none;
            padding: 0 24px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ─── UTILITIES ─── */
        .scroll-thin::-webkit-scrollbar { width: 4px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
        .scroll-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .lang-btn {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            font-family: 'Space Mono', monospace; font-size: 0.6rem; padding: 4px 6px;
            cursor: pointer; transition: all 0.2s;
        }
        .lang-btn.active, .lang-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }

        .theme-toggle-btn {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            cursor: pointer; font-size: 1rem; padding: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; width: 100%; border-radius: 8px;
        }
        .theme-toggle-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }
        .theme-icon-sun { display: none; }
        .light .theme-icon-sun { display: block; }
        .light .theme-icon-moon { display: none; }

        .status-pill {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            padding: 4px 10px;
            border: 1px solid var(--border);
            color: var(--text-faint);
            text-transform: uppercase;
        }
        .status-pill.ready { color: var(--gold); border-color: var(--gold); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- NAV -->
    <nav>
        <a href="/landing" class="nav-logo">
            <img src="logo_fixed.jpg" alt="Arbitra" class="light-logo w-5 h-5 object-contain rounded-[3px] hidden">
            <img src="logo_night.jpg" alt="Arbitra" class="dark-logo w-5 h-5 object-contain rounded-[3px]">
            <span class="nav-logo-text">Arbitra<span> AI</span></span>
        </a>

        <ul class="nav-links">
            <li><a href="/landing">Asosiy</a></li>
            <li><a href="./aksiyalar.html">Aksiyalar</a></li>
            <li><a href="./AiAssistent.html" class="active">AI Assistent</a></li>
            <li><a href="./profil.html">Profil</a></li>
        </ul>

        <div class="nav-right">
            <div id="dataStatus" class="status-pill">Yuklanmoqda...</div>
            <button onclick="clearChat()" class="mono text-[10px] border border-[var(--border)] px-4 py-2 hover:bg-[var(--red)] hover:text-white transition-all uppercase tracking-widest">
                Tozalash
            </button>
        </div>
    </nav>

    <div class="flex flex-1 pt-[68px] overflow-hidden">
        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
            <div id="chatMessages" class="messages-area scroll-thin">
                <!-- Initial Message -->
                <div class="bubble ai">
                    Assalomu alaykum! Men Arbitra AI yordamchisiman. O'zbekiston fond bozori, aksiyalar narxlari va moliyaviy hisobotlar bo'yicha savollaringizga javob bera olaman.
                </div>
            </div>

            <div class="input-area">
                <div class="chat-container">
                    <div class="input-box">
                        <input type="text" id="chatInput" placeholder="Savolingizni yozing (masalan: Eng arzon aksiyalar qaysi?)" autocomplete="off">
                        <button id="sendBtn" class="send-btn" disabled onclick="sendMessage()">YUBORISH</button>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="quickAsk('Eng ko\'p o\'sgan aksiyalar?')" class="mono text-[8px] border border-[var(--border)] px-3 py-1 opacity-60 hover:opacity-100 transition-all">Eng ko'p o'sgan aksiyalar?</button>
                        <button onclick="quickAsk('Dividend beradigan kompaniyalar?')" class="mono text-[8px] border border-[var(--border)] px-3 py-1 opacity-60 hover:opacity-100 transition-all">Dividend beradigan kompaniyalar?</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');
        let siteContext = '';

        async function loadSiteData() {
            try {
                const resp = await fetch('./parser/data/bozor_data.json');
                const data = await resp.json();
                siteContext = JSON.stringify(data);
                const status = document.getElementById('dataStatus');
                status.textContent = 'Tayyor';
                status.classList.add('ready');
            } catch (e) {
                console.error("Data loading failed", e);
            }
        }

        chatInput.addEventListener('input', () => {
            sendBtn.disabled = chatInput.value.trim().length === 0;
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `bubble ${sender}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            chatInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, context: siteContext })
                });
                const data = await response.json();
                appendMessage('ai', data.reply || "Kechirasiz, javob berishda xatolik yuz berdi.");
            } catch (e) {
                appendMessage('ai', "Server bilan bog'lanishda xatolik.");
            }
        }

        function quickAsk(text) {
            chatInput.value = text;
            sendBtn.disabled = false;
            sendMessage();
        }

        function clearChat() {
            chatMessages.innerHTML = '';
            appendMessage('ai', 'Chat tozalandi. Yangi savolingizni yozing.');
        }

        /* ─── THEME ─── */
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('light');
            localStorage.setItem('theme', html.classList.contains('light') ? 'light' : 'dark');
            updateLogos();
        }

        function updateLogos() {
            const isLight = document.documentElement.classList.contains('light');
            document.querySelectorAll('.light-logo').forEach(el => el.classList.toggle('hidden', !isLight));
            document.querySelectorAll('.dark-logo').forEach(el => el.classList.toggle('hidden', isLight));
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light');
            updateLogos();
        }

        /* ─── LANG ─── */
        function setLang(code) {
            localStorage.setItem('lang', code);
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.textContent.toLowerCase() === code);
            });
        }

        /* ─── SIDEBAR ─── */
        document.addEventListener('DOMContentLoaded', () => {
            loadSiteData();
            updateLogos();
            const savedLang = localStorage.getItem('lang') || 'uz';
            setLang(savedLang);
        });
    </script>
</body>
</html>
