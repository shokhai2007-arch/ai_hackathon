<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozor - Arbitra</title>
    <link rel="stylesheet" href="./css/main.css">
    <style>
        body { user-select: none; -webkit-user-select: none; }
        .gold-text { color: #b7b72e; text-shadow: 0px 2px 4px rgba(0,0,0,0.1); }
        .sidebar-btn { transition: all 0.2s ease-in-out; }
        .sidebar-btn:hover { background-color: #f3f4f6; transform: scale(1.05); }
        .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .slide-down { animation: slideDown 0.25s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .card-hover { transition: all 0.25s ease; }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 25px -8px rgba(0,0,0,0.12); }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 2px solid #059669; color: #059669; font-weight: 600; }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card-hover { animation: fadeInUp 0.3s ease both; }

        /* Hamburger */
        .hamburger { display: none; background: none; border: 1px solid #d1d5db; color: #6b7280; cursor: pointer; padding: 6px; border-radius: 6px; transition: all 0.2s; }
        .hamburger:hover { background: #059669; color: white; border-color: #059669; }
        .hamburger svg { width: 22px; height: 22px; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
          .hamburger { display: flex !important; align-items: center; justify-content: center; }
          body > aside { position: fixed !important; left: -120px !important; top: 0 !important; bottom: 0 !important; width: 100px !important; transition: left 0.3s ease !important; z-index: 50 !important; }
          body > aside.open { left: 0 !important; }
          header h1 { font-size: 1rem !important; }
          header .flex.items-center.space-x-3 { gap: 8px !important; }
          header .flex.items-center.space-x-3 > a, header .flex.items-center.space-x-3 > button:last-child { display: none !important; }
          .grid-cols-1.md\\:grid-cols-4 { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
          .grid-cols-2.sm\\:grid-cols-3.md\\:grid-cols-4 { grid-template-columns: repeat(2, 1fr) !important; }
          .flex-1.overflow-y-auto.p-6 { padding: 12px !important; }
          .tab-btn { font-size: 12px !important; padding: 10px 12px !important; }
        }
        @media (max-width: 480px) {
          body > aside { width: 80px !important; left: -100px !important; padding: 12px 0 !important; }
          body > aside .w-20 { width: 60px !important; }
          body > aside .sidebar-btn { width: 60px !important; padding: 8px 4px !important; }
          body > aside .sidebar-btn svg { width: 20px !important; height: 20px !important; }
          body > aside .sidebar-btn span { font-size: 9px !important; }
          body > aside .gold-text { font-size: 1rem !important; }
          header { padding: 0 12px !important; }
          .grid-cols-1.md\\:grid-cols-4 { grid-template-columns: 1fr 1fr !important; }
          .grid-cols-2.sm\\:grid-cols-3.md\\:grid-cols-4 { grid-template-columns: 1fr 1fr !important; }
          .tab-btn { font-size: 10px !important; padding: 8px 8px !important; }
        }
    </style>
    <script>if(localStorage.getItem('ecoUsDarkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden">

            <nav class="flex flex-col items-center w-full space-y-6">

                <a href="/bozor.html"><button class="sidebar-btn w-20 py-2 flex flex-col items-center justify-center rounded-xl text-emerald-600 bg-emerald-50 border border-emerald-100 font-semibold shadow-sm"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg><span class="text-[11px] font-medium mt-1">Bozor</span></button></a>
                <a href="/aksiyalar.html"><button class="sidebar-btn w-20 py-2 flex flex-col items-center justify-center rounded-xl text-gray-500 hover:text-amber-500"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" /></svg><span class="text-[11px] font-medium mt-1">Aksiyalar</span></button></a>
            </nav>
        </div>
        <button id="themeToggle" class="sidebar-btn p-3 rounded-full text-gray-400 hover:text-gray-600 relative">
            <div class="relative w-6 h-6">
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 absolute inset-0 transition-all duration-500" style="transform-origin: center;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 absolute inset-0 transition-all duration-500 opacity-0 scale-0" style="transform-origin: center;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>

        </button>

    <main class="flex-1 flex flex-col bg-gray-50 overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0">
            <button class="hamburger" onclick="toggleMobileSidebar()" aria-label="Menu"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg></button>
            <h1 class="text-lg font-bold text-gray-800">Bozor</h1>
            <div class="flex items-center space-x-3">
                <span class="text-xs text-gray-400 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100">
                    Yangilangan: <span id="updateDate">-</span>
                </span>
                <a href="/aksiyalar.html">
                    <button class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-4 py-2 rounded-lg transition shadow-sm flex items-center space-x-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" /></svg>
                        <span>Aksiyalar</span>

                <button id="authBtn" onclick="openLoginModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-4 py-2 rounded-lg transition shadow-sm">Kirish</button>

        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 card-hover">
                    <p class="text-xs text-gray-400 font-medium">Kompaniyalar</p>
                    <p id="companyCount" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 card-hover">
                    <p class="text-xs text-gray-400 font-medium">Tarif rejalari</p>
                    <p id="planCount" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 card-hover">
                    <p class="text-xs text-gray-400 font-medium">FAQ bo'limlari</p>
                    <p id="faqCount" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 card-hover">
                    <p class="text-xs text-gray-400 font-medium">Aksiyalar (ko't/lik)</p>
                    <p id="activePromoCount" class="text-2xl font-bold text-gray-800">0</p>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm mb-6">
                <div class="flex border-b border-gray-100">
                    <button onclick="switchTab('companies', this)" class="tab-active tab-btn px-5 py-3 text-sm text-gray-500 hover:text-emerald-600 transition">Kompaniyalar</button>
                    <button onclick="switchTab('plans', this)" class="tab-btn px-5 py-3 text-sm text-gray-500 hover:text-emerald-600 transition">Tariflar</button>
                    <button onclick="switchTab('faq', this)" class="tab-btn px-5 py-3 text-sm text-gray-500 hover:text-emerald-600 transition">FAQ</button>

                <div id="tab-companies" class="p-5 tab-content">
                    <div id="companiesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>

                <div id="tab-plans" class="p-5 tab-content hidden">

                <div id="tab-faq" class="p-5 tab-content hidden">

                <div id="tab-info" class="p-5 tab-content hidden">
                    <div id="infoContainer"></div>

    <script>
        const BOZOR_DATA_URL = './parser/data/bozor_data.json';

        let bozorData = null;

        async function loadBozorData() {
            try {
                const resp = await fetch(BOZOR_DATA_URL);
                bozorData = await resp.json();
            } catch {
                bozorData = getFallbackData();
            }
            renderAll();
        }

        function getFallbackData() {
            return {
                site: { name: 'Bozor', description: 'Kompaniyalar va tariflar ma\'lumotlari', company: 'MULTIBROKER MChJ', lastUpdated: '2026-05-21' },
                companies: [
                    { name: 'Agrobank', sector: 'Bank' }, { name: 'Kafolat', sector: 'Sug\'urta' },
                    { name: 'SQB', sector: 'Bank' }, { name: 'Ipak Yo\'li', sector: 'Bank' },
                    { name: 'UNG', sector: 'Neft va gaz' }, { name: 'UzEx', sector: 'Birja' },
                    { name: 'Qizilqum sement', sector: 'Qurilish' }, { name: 'Aloqa', sector: 'Telekommunikatsiya' }
                ],
                plans: [
                    { name: 'Investor', commissions: { stock_listed_buy_sell: '0.31%', broker_stock_listed: '0.63%' } },
                    { name: 'Treyder', commissions: { stock_listed_buy_sell: '0.31%', broker_stock_listed: '1%' } },
                    { name: 'Pro', commissions: { stock_listed_buy_sell: '0.31%', broker_stock_listed: '1%' } }
                ],
                faq: [
                    { category: 'Fond bozori', questions: [{ q: 'Fond bozori nima?', a: 'Fond bozori - qimmatli qog\'ozlar savdosi maydoni.' }] }
                ]
            };
        }

        function renderAll() {
            if (!bozorData) return;

            document.getElementById('updateDate').textContent = bozorData.lastUpdated || '-';
            document.getElementById('companyCount').textContent = bozorData.companies?.length || 0;
            document.getElementById('planCount').textContent = bozorData.plans?.length || 0;
            document.getElementById('faqCount').textContent = bozorData.faq?.length || 0;

            const stocks = bozorData.stocks || [];
            const upCount = stocks.filter(s => s.changePercent > 0).length;
            const downCount = stocks.filter(s => s.changePercent < 0).length;
            document.getElementById('activePromoCount').innerHTML = `${upCount} <span class="text-xs font-normal text-green-500">+</span> / ${downCount} <span class="text-xs font-normal text-red-500">-</span>`;

            renderCompanies();
            renderPlans();
            renderFaq();
            renderInfo();
        }

        function getLocalPromotions() {
            try { return JSON.parse(localStorage.getItem('eco_us_promotions')) || []; } catch { return []; }
        }

        function companyToKey(name) {
            const map = { 'Agrobank': 'agrobank', 'Kafolat': 'kafolat', 'SQB': 'sqb', "Ipak Yo'li": 'ipak', 'UNG': 'ung', 'UzEx': 'uzex', 'Qizilqum sement': 'qizilqum', 'Aloqa': 'aloqa' };
            return map[name] || name.toLowerCase().replace(/\s+/g, '');
        }

        function getStockByKey(key) {
            return (bozorData.stocks || []).find(s => s.key === key) || null;
        }

        function renderCompanies() {
            const grid = document.getElementById('companiesGrid');
            const companies = bozorData.companies || [];
            if (companies.length === 0) {
                grid.innerHTML = '<p class="text-sm text-gray-400 col-span-full text-center py-8">Ma\'lumot topilmadi</p>';
                return;
            }
            const colors = ['bg-blue-50 text-blue-500', 'bg-emerald-50 text-emerald-500', 'bg-amber-50 text-amber-500', 'bg-purple-50 text-purple-500', 'bg-rose-50 text-rose-500', 'bg-cyan-50 text-cyan-500', 'bg-orange-50 text-orange-500', 'bg-teal-50 text-teal-500'];
            grid.innerHTML = companies.map((c, i) => {
                const stock = getStockByKey(companyToKey(c.name));
                const priceStr = stock ? stock.price.toLocaleString() + " so'm" : '';
                const pctStr = stock ? (stock.changePercent >= 0 ? '+' : '') + stock.changePercent.toFixed(2) + '%' : '';
                const isUp = stock ? stock.changePercent >= 0 : true;
                return `
                <div class="bg-gray-50 rounded-xl p-4 text-center card-hover fade-in border border-gray-50">
                    <div class="w-14 h-14 mx-auto rounded-xl ${colors[i % colors.length]} flex items-center justify-center text-lg font-bold mb-3">${c.name.charAt(0)}</div>
                    <h3 class="font-bold text-gray-800 text-sm">${c.name}</h3>
                    <p class="text-xs text-gray-400 mt-0.5">${c.sector || 'Noma\'lum'}</p>
                    ${priceStr ? `<p class="text-sm font-bold text-gray-700 mt-2">${priceStr}</p>` : ''}
                    ${pctStr ? `<p class="text-xs font-semibold ${isUp ? 'text-green-600' : 'text-red-600'}">${pctStr}</p>` : ''}
                    <a href="./sharx.html?company=${companyToKey(c.name)}" class="inline-block text-xs font-medium text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-lg transition mt-2">Chart</a>
                </div>
            `}).join('');
        }

        function renderPlans() {
            const container = document.getElementById('plansContainer');
            const plans = bozorData.plans || [];
            if (plans.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">Ma\'lumot topilmadi</p>';
                return;
            }
            const gradients = ['from-emerald-500 to-emerald-600', 'from-blue-500 to-blue-600', 'from-purple-500 to-purple-600'];
            container.innerHTML = plans.map((p, i) => `
                <div class="bg-gray-50 rounded-xl p-5 mb-4 fade-in border border-gray-50">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-gray-800">${p.name}</h3>
                        <span class="text-xs px-3 py-1 rounded-full bg-gradient-to-r ${gradients[i]} text-white font-medium">Reja</span>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 text-xs">
                        ${Object.entries(p.commissions || {}).map(([key, val]) => `
                            <div class="bg-white rounded-lg p-2.5 border border-gray-50">
                                <p class="text-gray-400 mb-0.5">${formatKey(key)}</p>
                                <p class="font-bold text-gray-800">${val}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function formatKey(key) {
            const map = {
                stock_listed_buy_sell: 'Listing aksiyalar',
                stock_unlisted_buy_sell: 'Listingdan tashqari aksiyalar',
                bond_listed_buy_sell: 'Listing obligatsiyalar',
                bond_unlisted_buy_sell: 'Listingdan tashqari obligatsiyalar',
                depository_stock_listed: 'Depozitariy (listing aksiya)',
                depository_stock_unlisted: 'Depozitariy (listingdan tashqari)',
                depository_bond_listed: 'Depozitariy (listing obligatsiya)',
                depository_bond_unlisted: 'Depozitariy (listingdan tashqari)',
                stamp_duty: 'Gerb yig\'imi',
                broker_stock_listed: 'Broker (listing aksiya)',
                broker_stock_unlisted: 'Broker (listingdan tashqari)',
                broker_bond_listed: 'Broker (listing obligatsiya)',
                broker_bond_unlisted: 'Broker (listingdan tashqari)'
            };
            return map[key] || key.replace(/_/g, ' ');
        }

        function renderFaq() {
            const container = document.getElementById('faqContainer');
            const faq = bozorData.faq || [];
            if (faq.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">Ma\'lumot topilmadi</p>';
                return;
            }
            container.innerHTML = faq.map(cat => `
                <div class="mb-5">
                    <h3 class="font-bold text-gray-800 text-base mb-3 flex items-center">
                        <svg class="w-4 h-4 mr-2 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" /></svg>
                        ${cat.category}
                    </h3>
                    <div class="space-y-2">
                        ${(cat.questions || []).map(q => `
                            <div class="bg-white rounded-lg border border-gray-50 overflow-hidden">
                                <button onclick="this.nextElementSibling.classList.toggle('hidden');this.classList.toggle('active')" class="w-full text-left px-4 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 flex items-center justify-between transition">
                                    <span>${q.q}</span>
                                    <svg class="w-4 h-4 text-gray-400 transition transform" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
                                </button>
                                <div class="hidden px-4 pb-3 text-sm text-gray-500 border-t border-gray-50 pt-3">
                                    ${q.a}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderInfo() {
            const container = document.getElementById('infoContainer');
            const s = bozorData.site || {};
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-gray-50 rounded-xl p-5">
                        <h3 class="font-bold text-gray-800 mb-3">Bozor haqida</h3>
                        <p class="text-sm text-gray-600 mb-4">${s.description || ''}</p>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between"><span class="text-gray-400">Kompaniya</span><span class="font-medium text-gray-800">${s.company || ''}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">Ro'yxatdan o'tgan</span><span class="font-medium text-gray-800">${s.registered || ''}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">STIR</span><span class="font-medium text-gray-800">${s.stir || ''}</span></div>
                        </div>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-5">
                        <h3 class="font-bold text-gray-800 mb-3">Brokerlar</h3>
                        <div class="space-y-3">
                            ${(s.brokers || []).map(b => `
                                <div class="bg-white rounded-lg p-3 border border-gray-50">
                                    <p class="font-medium text-gray-800 text-sm">${b.name}</p>
                                    <p class="text-xs text-gray-400">Litsenziya: ${b.license} | STIR: ${b.stir}</p>
                                </div>
                            `).join('')}
                        </div>
                        <p class="text-xs text-gray-400 mt-4">To'lov xizmati: ${s.paymentService || ''}</p>
                    </div>
                </div>
            `;
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('text-gray-500');
            });
            btn.classList.add('tab-active');
            btn.classList.remove('text-gray-500');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }

        /* ─── MOBILE MENU ─── */
        function toggleMobileSidebar() {
          document.querySelector('body > aside').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
          if (window.innerWidth <= 768 && !e.target.closest('aside') && !e.target.closest('.hamburger')) {
            document.querySelector('body > aside')?.classList.remove('open');
          }
        });

        document.addEventListener('DOMContentLoaded', loadBozorData);
    </script>
<script>
(function(){var s=document.getElementById('sunIcon'),m=document.getElementById('moonIcon'),t=document.getElementById('themeToggle');function a(d){document.documentElement.classList.toggle('dark-mode',d);if(s&&m){if(d){s.style.transform='rotate(360deg) scale(0)';s.style.opacity='0';m.style.transform='rotate(0deg) scale(1)';m.style.opacity='1'}else{s.style.transform='rotate(0deg) scale(1)';s.style.opacity='1';m.style.transform='rotate(-360deg) scale(0)';m.style.opacity='0'}}try{localStorage.setItem('ecoUsDarkMode',d)}catch(e){}}if(localStorage.getItem('ecoUsDarkMode')==='true')a(true);if(t)t.addEventListener('click',function(){a(!document.documentElement.classList.contains('dark-mode'))})})();
</script>
