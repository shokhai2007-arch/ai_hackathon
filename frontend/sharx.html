<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --ink: #0a0a1a;
            --ink-mid: #12122a;
            --ink-soft: #1a1a3e;
            --paper: #e8e8ff;
            --paper-dim: #d0d0f0;
            --gold: #00f0ff;
            --gold-light: #5cf0ff;
            --gold-pale: #c0f0ff;
            --teal: #b44dff;
            --teal-dim: #7b2fcc;
            --red: #ff3366;
            --red-dim: #cc0033;
            --text-main: #e0e0ff;
            --text-dim: #8888bb;
            --text-faint: #5555aa;
            --border: rgba(0,240,255,0.15);
            --border-strong: rgba(0,240,255,0.35);

            --sidebar-bg: var(--ink-mid);
            --sidebar-hover: var(--ink-soft);
            --sidebar-active: var(--gold);
            --sidebar-text: var(--text-dim);
            --sidebar-text-active: var(--text-main);
        }

        .light {
            --ink: #f0f2f8;
            --ink-mid: #e2e5f0;
            --ink-soft: #ffffff;
            --paper: #12122a;
            --paper-dim: #1a1a3e;
            --gold: #0088cc;
            --gold-light: #00a0e8;
            --gold-pale: #b8ddf0;
            --teal: #7b2fcc;
            --teal-dim: #5a1f99;
            --red: #cc0044;
            --red-dim: #990033;
            --text-main: #1a1a3e;
            --text-dim: #5555aa;
            --text-faint: #8888bb;
            --border: rgba(0,136,204,0.2);
            --border-strong: rgba(0,136,204,0.35);

            --sidebar-bg: var(--ink-mid);
            --sidebar-hover: var(--ink-soft);
            --sidebar-active: var(--gold);
            --sidebar-text: var(--text-dim);
            --sidebar-text-active: var(--text-main);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--ink);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        h1, h2, h3, h4 { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0 24px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 26, 0.82);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .light nav { background: rgba(240, 242, 248, 0.82); }

        .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; min-width: 150px; }
        .nav-logo-text { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.15rem; color: var(--text-main); letter-spacing: -0.02em; }
        .nav-logo-text span { color: var(--gold); }

        .nav-links { display: flex; gap: 24px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 11px; font-family: 'Orbitron', sans-serif; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }

        /* ─── SIDEBAR ─── */
        .sidebar-wrapper { flex-shrink: 0; position: relative; z-index: 20; }
        .layout-sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--border); }
        .nav-item { color: var(--sidebar-text); transition: all 0.2s ease; position: relative; cursor: pointer; border: none; background: transparent; text-align: left; }
        .nav-item:hover { color: var(--sidebar-text-active); background: var(--sidebar-hover); }
        .nav-item.active { color: var(--sidebar-text-active); }
        .nav-item.active::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 24px; background: var(--sidebar-active);
            border-radius: 0 3px 3px 0; box-shadow: 0 0 8px var(--sidebar-active);
        }
        .sidebar-collapsed { width: 64px !important; }
        .sidebar-expanded { width: 220px !important; }
        .sidebar-text-label { transition: opacity 0.2s ease, visibility 0.2s ease; white-space: nowrap; }
        .sidebar-collapsed .sidebar-text-label { opacity: 0; visibility: hidden; }

        .sidebar-divider { height: 1px; background: var(--border); margin: 12px 10px; }
        .sidebar-section-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); padding: 0 16px; margin-bottom: 8px; font-weight: 800; display: block; }
        .sidebar-collapsed .sidebar-section-title { display: none; }

        /* ─── PANELS ─── */
        .panel-glass {
            background: var(--ink-soft);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .panel-glass::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.3;
        }

        .price-up { color: var(--gold); }
        .price-down { color: var(--red); }

        .order-row { transition: background 0.1s; position: relative; }
        .order-row:hover { background: rgba(255, 255, 255, 0.05); }
        .bar-ask { background: rgba(255, 51, 102, 0.1); position: absolute; right: 0; top: 0; bottom: 0; z-index: 0; }
        .bar-bid { background: rgba(0, 240, 255, 0.1); position: absolute; right: 0; top: 0; bottom: 0; z-index: 0; }

        /* ─── SCROLL ─── */
        .scroll-thin::-webkit-scrollbar { width: 4px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
        .scroll-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .lang-btn {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            font-family: 'Space Mono', monospace; font-size: 0.6rem; padding: 4px 6px;
            cursor: pointer; transition: all 0.2s;
        }
        .lang-btn.active, .lang-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }

        .theme-toggle-btn {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            cursor: pointer; font-size: 1rem; padding: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; width: 100%; border-radius: 8px;
        }
        .theme-toggle-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }
        .theme-icon-sun { display: none; }
        .light .theme-icon-sun { display: block; }
        .light .theme-icon-moon { display: none; }

        .sidebar-tab-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            border: none;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .sidebar-tab-btn:hover { background: var(--sidebar-hover); color: var(--text-main); }
        .sidebar-tab-btn.active { color: var(--gold); background: rgba(0, 240, 255, 0.05); }
    </style>
</head>

    <script>
        let allData = null;
        let currentStock = null;
        let chartInstance = null;

        const params = new URLSearchParams(window.location.search);
        const stockKey = params.get('company') || params.get('bank');

        async function loadData() {
            try {
                const resp = await fetch('./parser/data/bozor_data.json');
                allData = await resp.json();
                currentStock = allData.stocks.find(s => s.key === stockKey);

                if (!currentStock) {
                    alert("Aksiya topilmadi!");
                    return;
                }

                renderHeader();
                renderOrderBook();
                initChart();
                document.getElementById('marketStatus').textContent = "Bozor Ochiq · " + (allData.lastUpdated || '');
            } catch (e) {
                console.error(e);
            }
        }

        function renderHeader() {
            const s = currentStock;
            document.getElementById('headerContent').classList.remove('hidden');
            document.getElementById('stockTicker').textContent = s.ticker;
            document.getElementById('stockName').textContent = s.name;
            document.getElementById('stockPrice').textContent = s.price.toLocaleString();

            const isUp = s.change >= 0;
            const color = isUp ? 'var(--gold)' : 'var(--red)';
            document.getElementById('stockPrice').style.color = color;
            document.getElementById('stockChange').textContent = (isUp ? '↑ ' : '↓ ') + Math.abs(s.change).toLocaleString();
            document.getElementById('stockChangePct').textContent = `(${Math.abs(s.changePercent).toFixed(2)}%)`;
            document.getElementById('stockChangeRow').style.color = color;

            const marketData = [
                { label: 'Ochiq', value: s.open.toLocaleString() },
                { label: 'Yopilish', value: s.prevClose.toLocaleString() },
                { label: 'Hajm', value: s.volume.toLocaleString() },
                { label: 'O\'rt. Hajm', value: s.avgVolume.toLocaleString() },
                { label: '52H Min', value: s.low.toLocaleString() },
                { label: '52H Max', value: s.high.toLocaleString() },
                { label: 'P/E', value: (Math.random()*12 + 4).toFixed(2) },
                { label: 'Div. Yield', value: (Math.random()*8).toFixed(1) + '%' },
            ];

            document.getElementById('marketDataRow').innerHTML = marketData.map(d => `
                <div class="panel-glass p-3">
                    <p class="text-[var(--text-faint)] text-[8px] uppercase mono font-bold mb-1">${d.label}</p>
                    <p class="Orbitron text-xs font-bold text-[var(--text-main)]">${d.value}</p>
                </div>
            `).join('');
        }

        function initChart() {
            const ctx = document.getElementById('stockChart').getContext('2d');
            const history = currentStock.history;
            const labels = history.map(h => h.time);
            const prices = history.map(h => h.close);
            
            const isLight = document.documentElement.classList.contains('light');
            const mainColor = isLight ? '#0088cc' : '#00f0ff';
            const gridColor = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(0,240,255,0.05)';

            if (chartInstance) chartInstance.destroy();

            const grad = ctx.createLinearGradient(0, 0, 0, 400);
            grad.addColorStop(0, mainColor + '44');
            grad.addColorStop(1, mainColor + '00');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: prices,
                        borderColor: mainColor,
                        backgroundColor: grad,
                        borderWidth: 2,
                        tension: 0.2,
                        fill: true,
                        pointRadius: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: 'var(--text-faint)', font: { size: 9, family: 'Space Mono' } } 
                        },
                        y: { 
                            position: 'right',
                            grid: { color: gridColor },
                            ticks: { color: 'var(--text-faint)', font: { size: 9, family: 'Space Mono' } }
                        }
                    }
                }
            });
        }

        function switchView(view, btn) {
            document.querySelectorAll('.sidebar-tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Logic for switching view content could go here
        }

        function setChartType(type, btn) {
            // In a real app, this would switch between line/candle chart
            alert(type === 'candle' ? "Shamlar grafigi tez kunda..." : "Chiziqli grafik tanlandi");
        }

        function setPeriod(period, btn) {
            document.querySelectorAll('.period-btn').forEach(b => {
                b.classList.add('opacity-40');
                b.classList.remove('border', 'text-[var(--gold)]');
                b.style.borderColor = '';
            });
            btn.classList.remove('opacity-40');
            btn.classList.add('border', 'text-[var(--gold)]');
            btn.style.borderColor = 'var(--gold)';
        }

        function renderOrderBook() {
            const s = currentStock;
            const asks = [];
            const bids = [];
            const count = 12;

            for (let i = 0; i < count; i++) {
                const off = (i + 1) * (s.price * 0.001);
                asks.push({ price: s.price + off, volume: Math.floor(Math.random() * 1000 + 50) });
                bids.push({ price: s.price - off, volume: Math.floor(Math.random() * 1000 + 50) });
            }
            asks.reverse();

            const maxVol = Math.max(...asks.map(a => a.volume), ...bids.map(b => b.volume));

            document.getElementById('orderBookAsks').innerHTML = asks.map(a => `
                <div class="order-row flex justify-between px-4 py-1 text-[10px] mono">
                    <div class="bar-ask" style="width: ${(a.volume/maxVol)*100}%"></div>
                    <span class="relative z-10 price-down font-bold">${a.price.toFixed(2)}</span>
                    <span class="relative z-10 text-[var(--text-main)]">${a.volume}</span>
                </div>
            `).join('');

            document.getElementById('orderBookBids').innerHTML = bids.map(b => `
                <div class="order-row flex justify-between px-4 py-1 text-[10px] mono">
                    <div class="bar-bid" style="width: ${(b.volume/maxVol)*100}%"></div>
                    <span class="relative z-10 price-up font-bold">${b.price.toFixed(2)}</span>
                    <span class="relative z-10 text-[var(--text-main)]">${b.volume}</span>
                </div>
            `).join('');

            document.getElementById('lastPrice').textContent = s.price.toLocaleString();
            document.getElementById('lastChange').textContent = (s.changePercent >= 0 ? '+' : '') + s.changePercent.toFixed(2) + '%';
            document.getElementById('lastChange').style.color = s.change >= 0 ? 'var(--gold)' : 'var(--red)';
            
            document.getElementById('spreadValue').textContent = (asks[asks.length-1].price - bids[0].price).toFixed(2);
        }

        /* ─── THEME ─── */
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('light');
            localStorage.setItem('theme', html.classList.contains('light') ? 'light' : 'dark');
            updateLogos();
            if (chartInstance) initChart();
        }

        function updateLogos() {
            const isLight = document.documentElement.classList.contains('light');
            document.querySelectorAll('.light-logo').forEach(el => el.classList.toggle('hidden', !isLight));
            document.querySelectorAll('.dark-logo').forEach(el => el.classList.toggle('hidden', isLight));
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light');
            updateLogos();
        }

        /* ─── LANG ─── */
        function setLang(code) {
            localStorage.setItem('lang', code);
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.textContent.toLowerCase() === code);
            });
        }

        /* ─── SIDEBAR ─── */
        function initSidebarHover() {
            const wrapper = document.getElementById('sidebarWrapper');
            const sidebar = document.getElementById('sidebar');
            wrapper.addEventListener('mouseenter', () => {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('sidebar-expanded');
            });
            wrapper.addEventListener('mouseleave', () => {
                sidebar.classList.add('sidebar-collapsed');
                sidebar.classList.remove('sidebar-expanded');
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            initSidebarHover();
            updateLogos();
            const savedLang = localStorage.getItem('lang') || 'uz';
            setLang(savedLang);
        });
    </script>
</body>
</html>
