<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart - Arbitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./css/main.css">
    <style>
        :root {
            --sidebar-bg: #ffffff;
            --sidebar-hover: #f3f4f6;
            --sidebar-active: #0d9488;
            --sidebar-text: #6b7280;
            --sidebar-text-active: #111827;
            --header-bg: #ffffff;
            --chart-bg: #ffffff;
            --panel-bg: #ffffff;
            --order-ask: #dc2626;
            --order-bid: #16a34a;
            --border-subtle: #e2e8f0;
        }
        .dark {
            --sidebar-bg: #080e1a;
            --sidebar-hover: #111d33;
            --sidebar-active: #14b8a6;
            --sidebar-text: #475569;
            --sidebar-text-active: #f1f5f9;
            --header-bg: #1e293b;
            --chart-bg: #1e293b;
            --panel-bg: #1e293b;
            --border-subtle: #334155;
        }

        .layout-sidebar { background: var(--sidebar-bg); }
        .layout-header { background: var(--header-bg); }
        .layout-chart { background: var(--chart-bg); }
        .layout-panel { background: var(--panel-bg); }

        .nav-item {
            color: var(--sidebar-text);
            transition: all 0.2s ease;
            position: relative;
        }
        .nav-item:hover {
            color: var(--sidebar-text-active);
            background: var(--sidebar-hover);
        }
        .nav-item.active {
            color: var(--sidebar-text-active);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--sidebar-active);
            border-radius: 0 3px 3px 0;
            box-shadow: 0 0 8px var(--sidebar-active);
        }

        /* Theme toggle icon swap */
        .theme-icon-wrapper {
            position: relative;
            width: 20px; height: 20px;
            flex-shrink: 0;
        }
        .theme-icon-wrapper svg {
            position: absolute;
            inset: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .sun-icon { opacity: 1; transform: rotate(0deg) scale(1); }
        .moon-icon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        .dark .sun-icon { opacity: 0; transform: rotate(90deg) scale(0.5); }
        .dark .moon-icon { opacity: 1; transform: rotate(0deg) scale(1); }

        .theme-toggle-btn .theme-icon-wrapper svg {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }
        .theme-toggle-btn.spinning .theme-icon-wrapper svg {
            animation: theme-spin 0.5s ease;
        }
        @keyframes theme-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.3); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .tab-btn {
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--accent-green); }
        .tab-btn.active {
            color: var(--accent-green);
            border-bottom-color: var(--accent-green);
        }

        .order-row { transition: background 0.15s ease; }
        .order-row:hover { background: rgba(255,255,255,0.03); }
        .ask-bar { background: rgba(220,38,38,0.15); }
        .bid-bar { background: rgba(22,163,74,0.15); }

        .price-up { color: var(--accent-green); }
        .price-down { color: var(--accent-red); }

        .glow-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .badge-market {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 600;
        }
        .badge-market.open { background: rgba(22,163,74,0.15); color: var(--accent-green); }
        .badge-market.closed { background: rgba(239,68,68,0.15); color: var(--accent-red); }

        .sidebar-wrapper { flex-shrink: 0; position: relative; z-index: 20; }
        .sidebar-wrapper::after {
            content: '';
            position: absolute;
            left: 56px;
            top: 0;
            width: 40px;
            height: 100%;
        }
        .sidebar-text-label {
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .sidebar-collapsed .sidebar-text-label {
            opacity: 0;
            visibility: hidden;
            transition-delay: 0s;
        }
        .sidebar-expanded .sidebar-text-label {
            opacity: 1;
            visibility: visible;
            transition-delay: 0.05s;
        }
        .sidebar-collapsed { width: 56px !important; }
        .sidebar-expanded { width: 200px !important; }
        .nav-icon, .theme-icon-wrapper, #settingsPanel .theme-icon-wrapper { pointer-events: none; }
        .sidebar-collapsed .sidebar-collapsed-show { display: block !important; }
        .sidebar-collapsed .logo-dark { display: none !important; }
        .dark .sidebar-collapsed .logo-light { display: none !important; }
        .dark .sidebar-collapsed .logo-dark { display: block !important; }
        #settingsPanel {
            position: fixed;
            width: 140px;
            z-index: 100;
            border-radius: 8px;
            padding: 8px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-subtle, #e2e8f0);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .lang-btn {
            flex: 1;
            padding: 4px 0;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--sidebar-text);
            background: transparent;
            border: none;
        }
        .lang-btn:hover { background: var(--sidebar-hover); }
        .lang-btn.active { background: var(--sidebar-active); color: #fff; }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 4px;
        }
        .data-item {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
        }
        .data-item .label { color: var(--text-secondary); }
        .data-item .value { font-weight: 600; color: var(--text-primary); }

        body { overflow: hidden; background: var(--sidebar-bg); }
        .scroll-thin::-webkit-scrollbar { width: 3px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
        .scroll-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 2px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>

    <script>
        let allData = null;
        let currentStock = null;
        let chartInstance = null;
        let chartType = 'line';

        const params = new URLSearchParams(window.location.search);
        const stockKey = params.get('company') || params.get('bank');

        async function loadData() {
            try {
                const resp = await fetch('./parser/data/bozor_data.json');
                allData = await resp.json();
                currentStock = allData.stocks.find(s => s.key === stockKey);

                if (!currentStock) {
                    document.getElementById('headerLoading').innerHTML = '<span class="text-sm text-gray-400">Ma\'lumot topilmadi</span>';
                    return;
                }

                renderHeader();
                renderOrderBook();
                initChart();
            } catch (e) {
                document.getElementById('headerLoading').innerHTML = '<span class="text-sm text-red-400">Yuklashda xatolik</span>';
                console.error(e);
            }
        }

        function renderHeader() {
            const s = currentStock;
            document.getElementById('headerLoading').classList.add('hidden');
            document.getElementById('headerContent').classList.remove('hidden');

            document.getElementById('stockTicker').textContent = s.ticker;
            document.getElementById('stockName').textContent = s.name + ' / UZS';
            document.getElementById('stockPrice').textContent = s.price.toLocaleString() + ' so\'m';

            const isUp = s.change >= 0;
            const changeEl = document.getElementById('stockChange');
            const pctEl = document.getElementById('stockChangePct');
            changeEl.textContent = (isUp ? '+' : '') + s.change.toFixed(2);
            changeEl.className = 'text-sm font-semibold ' + (isUp ? 'price-up' : 'price-down');
            pctEl.textContent = (isUp ? '+' : '') + s.changePercent.toFixed(2) + '%';
            pctEl.className = 'text-xs ' + (isUp ? 'price-up' : 'price-down');

            const marketData = [
                { label: 'Kapital', value: (s.price * 1000000).toLocaleString() },
                { label: 'P/E', value: (Math.random() * 15 + 5).toFixed(2) },
                { label: 'Dividend', value: (Math.random() * 5 + 1).toFixed(2) + '%' },
                { label: 'Min/Max', value: s.low.toLocaleString() + ' / ' + s.high.toLocaleString() },
                { label: 'Hajm (o\'rt)', value: (s.avgVolume || 0).toLocaleString() },
                { label: '52 haftalik', value: (s.low).toLocaleString() + ' - ' + (s.high).toLocaleString() },
                { label: 'Ochiq', value: (s.open || s.price).toLocaleString() },
                { label: 'Oldingi', value: (s.prevClose || s.price).toLocaleString() },
            ];

            document.getElementById('marketDataRow').innerHTML = marketData.map(d => `
                <div class="data-item">
                    <div class="label">${d.label}</div>
                    <div class="value">${d.value}</div>
                </div>
            `).join('');
        }

        function initChart() {
            const ctx = document.getElementById('stockChart').getContext('2d');
            const history = currentStock.history;
            const labels = history.map(h => h.time);
            const prices = history.map(h => h.close);
            const isDark = document.documentElement.classList.contains('dark');

            if (chartInstance) chartInstance.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(5, 150, 105, 0.3)');
            gradient.addColorStop(1, 'rgba(5, 150, 105, 0.01)');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Narx (so\'m)',
                        data: prices,
                        borderColor: '#059669',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        tension: 0.1,
                        fill: true,
                        pointRadius: 0,
                        pointHitRadius: 10,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: isDark ? '#1e293b' : '#ffffff',
                            titleColor: isDark ? '#f1f5f9' : '#111827',
                            bodyColor: isDark ? '#94a3b8' : '#6b7280',
                            borderColor: isDark ? '#334155' : '#e5e7eb',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                title: (items) => items[0].label,
                                label: (item) => 'Narx: ' + Number(item.raw).toLocaleString() + ' so\'m'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: isDark ? '#475569' : '#9ca3af',
                                maxTicksLimit: 10,
                                font: { size: 10 }
                            }
                        },
                        y: {
                            grid: { color: isDark ? '#1e293b' : '#f3f4f6' },
                            ticks: {
                                color: isDark ? '#475569' : '#9ca3af',
                                font: { size: 10 },
                                callback: (v) => v.toLocaleString()
                            },
                            position: 'right'
                        }
                    }
                }
            });
        }

        function setChartType(type) {
            chartType = type;
            document.querySelectorAll('.chart-type-btn').forEach(b => {
                b.style.color = '#9ca3af';
                b.style.background = 'transparent';
            });
            event.target.style.color = 'var(--accent-green)';
            event.target.style.background = 'rgba(5,150,105,0.1)';
            if (type === 'candle') {
                alert('Candlestick chart tez orada qo\'shiladi');
            }
        }

        function renderOrderBook() {
            const s = currentStock;
            const basePrice = s.price;
            const asks = [];
            const bids = [];

            for (let i = 0; i < 10; i++) {
                const askPrice = basePrice + (i + 1) * (basePrice * 0.002);
                const bidPrice = basePrice - (i + 1) * (basePrice * 0.002);
                const askVol = Math.round(Math.random() * 500 + 100);
                const bidVol = Math.round(Math.random() * 500 + 100);
                asks.push({ price: askPrice, volume: askVol, total: askVol });
                bids.push({ price: bidPrice, volume: bidVol, total: bidVol });
            }

            let maxAskVol = Math.max(...asks.map(a => a.volume));
            let maxBidVol = Math.max(...bids.map(b => b.volume));

            const askContainer = document.getElementById('orderBookAsks');
            askContainer.innerHTML = asks.map(a => `
                <div class="order-row flex justify-between px-3 py-1 text-xs relative">
                    <div class="ask-bar absolute inset-0" style="width: ${(a.volume / maxAskVol) * 100}%;"></div>
                    <span class="relative z-10 price-down font-medium">${a.price.toFixed(2)}</span>
                    <span class="relative z-10 text-gray-400 dark:text-gray-500">${a.volume}</span>
                    <span class="relative z-10 text-gray-500 dark:text-gray-600">${(a.total / 1000).toFixed(1)}k</span>
                </div>
            `).join('');

            const bidContainer = document.getElementById('orderBookBids');
            bidContainer.innerHTML = bids.map(b => `
                <div class="order-row flex justify-between px-3 py-1 text-xs relative">
                    <div class="bid-bar absolute inset-0" style="width: ${(b.volume / maxBidVol) * 100}%;"></div>
                    <span class="relative z-10 price-up font-medium">${b.price.toFixed(2)}</span>
                    <span class="relative z-10 text-gray-400 dark:text-gray-500">${b.volume}</span>
                    <span class="relative z-10 text-gray-500 dark:text-gray-600">${(b.total / 1000).toFixed(1)}k</span>
                </div>
            `).join('');

            document.getElementById('lastPrice').textContent = basePrice.toLocaleString();
            const isUp = s.change >= 0;
            document.getElementById('lastPrice').className = 'text-base font-bold ' + (isUp ? 'price-up' : 'price-down');
            document.getElementById('lastChange').textContent = (isUp ? '+' : '') + s.changePercent.toFixed(2) + '%';
            document.getElementById('lastChange').className = 'text-xs ml-2 ' + (isUp ? 'price-up' : 'price-down');

            const spread = asks[0].price - bids[0].price;
            document.getElementById('spreadValue').textContent = spread.toFixed(2);
            document.getElementById('totalVolume').textContent = (s.volume || 0).toLocaleString();
        }

        function toggleDarkMode(btn) {
            btn.classList.add('spinning');
            setTimeout(() => btn.classList.remove('spinning'), 500);
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('darkMode', html.classList.contains('dark'));
            if (chartInstance) initChart();
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            initSidebarHover();
        });

        function initSidebarHover() {
            const wrapper = document.getElementById('sidebarWrapper');
            const sidebar = document.getElementById('sidebar');
            wrapper.addEventListener('mouseenter', function() {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('sidebar-expanded');
            });
            wrapper.addEventListener('mouseleave', function() {
                sidebar.classList.remove('sidebar-expanded');
                sidebar.classList.add('sidebar-collapsed');
                document.getElementById('settingsPanel').classList.add('hidden');
            });
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            const btn = document.getElementById('settingsBtn');
            if (panel.classList.contains('hidden')) {
                const rect = btn.getBoundingClientRect();
                panel.style.top = (rect.top - 10) + 'px';
                panel.style.left = (rect.right + 6) + 'px';
                panel.classList.remove('hidden');
            } else {
                panel.classList.add('hidden');
            }
        }

        const savedLang = localStorage.getItem('lang') || 'uz';
        function setLang(code) {
            localStorage.setItem('lang', code);
            document.querySelectorAll('#settingsPanel .lang-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === code);
            });
        }
        document.addEventListener('DOMContentLoaded', function() {
            setLang(savedLang);
        });

        document.addEventListener('click', function(e) {
            const panel = document.getElementById('settingsPanel');
            const btn = document.getElementById('settingsBtn');
            if (!panel.classList.contains('hidden') && !panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
