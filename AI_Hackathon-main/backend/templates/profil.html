<script>
(function(){var s=document.getElementById('sunIcon'),m=document.getElementById('moonIcon'),t=document.getElementById('themeToggle');function a(d){document.documentElement.classList.toggle('dark-mode',d);if(s&&m){if(d){s.style.transform='rotate(360deg) scale(0)';s.style.opacity='0';m.style.transform='rotate(0deg) scale(1)';m.style.opacity='1'}else{s.style.transform='rotate(0deg) scale(1)';s.style.opacity='1';m.style.transform='rotate(-360deg) scale(0)';m.style.opacity='0'}}try{localStorage.setItem('ecoUsDarkMode',d)}catch(e){}}if(localStorage.getItem('ecoUsDarkMode')==='true')a(true);if(t)t.addEventListener('click',function(){a(!document.documentElement.classList.contains('dark-mode'))})})();
</script>
<script>
function getPromotions() {
    try { return JSON.parse(localStorage.getItem('eco_us_promotions')) || []; } catch { return []; }
}

function getFavorites() {
    try { return JSON.parse(localStorage.getItem('eco_us_favorites')) || []; } catch { return []; }
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'short', year: 'numeric' });
}

function getStatusInfo(status) {
    const map = {
        active: { label: 'Faol', class: 'bg-emerald-100 text-emerald-700' },
        expired: { label: 'Tugagan', class: 'bg-red-100 text-red-700' },
        upcoming: { label: 'Kutilmoqda', class: 'bg-blue-100 text-blue-700' }
    };
    return map[status] || map.active;
}

function renderFavorites() {
    const container = document.getElementById('favContainer');
    const empty = document.getElementById('emptyFav');
    const count = document.getElementById('favCount');

    const promotions = getPromotions();
    const favorites = getFavorites();

    if (!Array.isArray(favorites) || favorites.length === 0) {
        container.innerHTML = '';
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        count.textContent = '0';
        return;
    }

    const favPromos = promotions.filter(p => favorites.includes(p.id));

    if (favPromos.length === 0) {
        container.innerHTML = '';
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        count.textContent = '0';
        return;
    }

    container.classList.remove('hidden');
    empty.classList.add('hidden');
    count.textContent = favPromos.length;

    container.innerHTML = favPromos.map(p => {
        const statusInfo = getStatusInfo(p.status);
        return `
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 flex flex-col fade-in">
                <div class="flex items-start justify-between mb-3">
                    <div class="bg-amber-50 rounded-lg w-11 h-11 flex items-center justify-center text-amber-500 flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                        </svg>
                    </div>
                    <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${statusInfo.class}">${statusInfo.label}</span>
                </div>
                <h3 class="font-bold text-gray-800 text-base mb-1">${p.name}</h3>
                ${p.discount ? `<div class="text-2xl font-black text-amber-500 mb-2">-${p.discount}%</div>` : ''}
                <p class="text-sm text-gray-500 mb-3 flex-1 line-clamp-2">${p.description || 'Tavsif mavjud emas'}</p>
                <div class="text-xs text-gray-400 space-y-1 pt-3 border-t border-gray-50 mt-auto">
                    <div class="flex items-center">
                        <svg class="w-3.5 h-3.5 mr-1.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        ${formatDate(p.startDate)} - ${formatDate(p.endDate)}
                    </div>
                </div>
                <button onclick="removeFavorite('${p.id}')" class="mt-3 pt-3 border-t border-gray-50 text-xs font-medium text-amber-500 hover:text-amber-600 bg-amber-50 hover:bg-amber-100 py-2 rounded-lg transition">Sevimli aksiyalardan olib tashlash</button>
            </div>
        `;
    }).join('');
}

function removeFavorite(id) {
    let favs = getFavorites();
    favs = favs.filter(f => f !== id);
    localStorage.setItem('eco_us_favorites', JSON.stringify(favs));
    renderFavorites();
}

const style = document.createElement('style');
style.textContent = `.fade-in { animation: fadeIn 0.3s ease; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }`;
document.head.appendChild(style);

document.addEventListener('DOMContentLoaded', renderFavorites);
</script>
