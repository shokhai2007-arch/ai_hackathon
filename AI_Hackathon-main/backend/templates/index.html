<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitra</title>
    <link rel="stylesheet" href="./css/main.css">
    <style>
        body { user-select: none; -webkit-user-select: none; }
        .gold-text {
            color: #b7b72e;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .sidebar-btn {
            transition: all 0.2s ease-in-out;
        }
        .gold-text { color: #eab308; text-shadow: 0px 2px 4px rgba(0,0,0,0.1); }
        .dark .gold-text { color: #facc15; text-shadow: 0px 2px 8px rgba(250,204,21,0.3); }
        .layout-sidebar { background: var(--sidebar-bg); }
        .nav-item {
            color: var(--sidebar-text);
            transition: all 0.2s ease;
            position: relative;
        }
        .nav-item:hover {
            color: var(--sidebar-text-active);
            background: var(--sidebar-hover);
        }
        .nav-item.active {
            color: var(--sidebar-text-active);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--sidebar-active);
            border-radius: 0 3px 3px 0;
            box-shadow: 0 0 8px var(--sidebar-active);
        }
        .theme-icon-wrapper {
            position: relative;
            width: 20px; height: 20px;
            flex-shrink: 0;
        }
        .theme-icon-wrapper svg {
            position: absolute;
            inset: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .sun-icon { opacity: 1; transform: rotate(0deg) scale(1); }
        .moon-icon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        .dark .sun-icon { opacity: 0; transform: rotate(90deg) scale(0.5); }
        .dark .moon-icon { opacity: 1; transform: rotate(0deg) scale(1); }
        .theme-toggle-btn .theme-icon-wrapper svg {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }
        .theme-toggle-btn.spinning .theme-icon-wrapper svg {
            animation: theme-spin 0.5s ease;
        }
        @keyframes theme-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.3); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .sidebar-wrapper { flex-shrink: 0; position: relative; z-index: 20; }
        .sidebar-wrapper::after {
            content: '';
            position: absolute;
            left: 56px;
            top: 0;
            width: 40px;
            height: 100%;
        }
        .sidebar-text-label {
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .sidebar-collapsed .sidebar-text-label {
            opacity: 0;
            visibility: hidden;
            transition-delay: 0s;
        }
        .sidebar-expanded .sidebar-text-label {
            opacity: 1;
            visibility: visible;
            transition-delay: 0.05s;
        }
        .sidebar-collapsed { width: 56px !important; }
        .sidebar-expanded { width: 200px !important; }
        .nav-icon, .theme-icon-wrapper, #settingsPanel .theme-icon-wrapper { pointer-events: none; }
        .sidebar-collapsed .sidebar-collapsed-show { display: block !important; }
        .sidebar-collapsed .logo-dark { display: none !important; }
        .dark .sidebar-collapsed .logo-light { display: none !important; }
        .dark .sidebar-collapsed .logo-dark { display: block !important; }
        #settingsPanel {
            position: fixed;
            width: 140px;
            z-index: 100;
            border-radius: 8px;
            padding: 8px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-subtle, #e2e8f0);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .lang-btn {
            flex: 1;
            padding: 4px 0;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--sidebar-text);
            background: transparent;
            border: none;
        }
        .lang-btn:hover { background: var(--sidebar-hover); }
        .lang-btn.active { background: var(--sidebar-active); color: #fff; }
        .scroll-thin::-webkit-scrollbar { width: 3px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
        .scroll-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 2px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
        body { overflow: hidden; background: var(--sidebar-bg); font-family: sans-serif; }
    </style>
    <script>if(localStorage.getItem('ecoUsDarkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
</head>
<body class="flex h-screen">

    <aside class="w-28 bg-white border-r border-gray-200 flex flex-col items-center py-6 justify-between select-none">

                    <div class="w-8 h-8 rounded-full border-2 border-current flex items-center justify-center font-bold text-xs tracking-tighter">
                        AI
                    </div>
                    <span class="text-[11px] font-medium mt-1">AI Assistent</span>
                </button>
                </a>
                <a href="./AiAssistent.html" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm">
                    <div class="w-5 h-5 flex-shrink-0 rounded-full border-2 border-current flex items-center justify-center font-bold text-[9px] tracking-tighter">AI</div>

                    <svg class="w-5 h-5 flex-shrink-0 nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>

            </nav>
            <div class="mt-auto pt-2 px-2 w-full space-y-1 flex-shrink-0">
                <button id="settingsBtn" onclick="toggleSettings()" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm w-full">
                    <svg class="w-5 h-5 flex-shrink-0 nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 0 1 0 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281Z"/></svg>
                    <span class="sidebar-text-label">Sozlamalar</span>
                </button>
            </div>
        </div>

        <button id="themeToggle" class="sidebar-btn p-3 rounded-full text-gray-400 hover:text-gray-600 relative">
            <div class="relative w-6 h-6">
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 absolute inset-0 transition-all duration-500" style="transform-origin: center;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 absolute inset-0 transition-all duration-500 opacity-0 scale-0" style="transform-origin: center;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
            </div>
        </button>
    </aside>
    </div>

    <!-- Settings Popup -->
    <div id="settingsPanel" class="hidden">
        <button onclick="toggleDarkMode(document.getElementById('settingsPanel').querySelector('.theme-toggle-btn'))" class="theme-toggle-btn flex items-center justify-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800" style="background:transparent;border:none;cursor:pointer;color:var(--sidebar-text);">
            <span class="theme-icon-wrapper" style="position:relative;width:20px;height:20px;flex-shrink:0;">
                <svg class="w-5 h-5 sun-icon" style="position:absolute;inset:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
                <svg class="w-5 h-5 moon-icon" style="position:absolute;inset:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
            </span>
        </button>
        <div class="flex justify-center space-x-1 mt-2">
            <button onclick="setLang('en')" class="lang-btn" data-lang="en">EN</button>
            <button onclick="setLang('ru')" class="lang-btn" data-lang="ru">RU</button>
            <button onclick="setLang('uz')" class="lang-btn" data-lang="uz">UZ</button>
        </div>
    </div>

    <main class="flex-1 flex flex-col justify-between bg-gray-50">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-end px-8">
            <button onclick="openLogin()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-5 py-2 rounded-lg transition shadow-sm">
                Kirish
            </button>
        </header>

        <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 mb-4 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />

        </div>

        <footer class="h-12 bg-white border-t border-gray-100 flex items-center justify-center text-xs text-gray-400">
            &copy; 2026 Arbitra. Barcha huquqlar himoyalangan.
        </footer>
    </main>
<script>
(function(){var s=document.getElementById('sunIcon'),m=document.getElementById('moonIcon'),t=document.getElementById('themeToggle');function a(d){document.documentElement.classList.toggle('dark-mode',d);if(s&&m){if(d){s.style.transform='rotate(360deg) scale(0)';s.style.opacity='0';m.style.transform='rotate(0deg) scale(1)';m.style.opacity='1'}else{s.style.transform='rotate(0deg) scale(1)';s.style.opacity='1';m.style.transform='rotate(-360deg) scale(0)';m.style.opacity='0'}}try{localStorage.setItem('ecoUsDarkMode',d)}catch(e){}}if(localStorage.getItem('ecoUsDarkMode')==='true')a(true);if(t)t.addEventListener('click',function(){a(!document.documentElement.classList.contains('dark-mode'))})})();
</script>
</body>

</html>
